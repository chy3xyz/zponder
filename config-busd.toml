# BSC BUSD 监听配置
# 过滤规则：
#   - Transfer 事件：value > 500 BUSD (18 decimals)
#   - Approval 事件：value > 1000 BUSD (18 decimals)

[global]
log_level = "info"
log_file = "./logs/busd-indexer.log"
snapshot_interval = 3600

[rpc]
# BSC 公共节点限制较严，建议使用专业节点：
#   - Ankr: https://rpc.ankr.com/bsc
#   - QuickNode: https://your-endpoint.bsc.quiknode.pro/
#   - GetBlock: https://bsc.getblock.io/mainnet/
url = "https://bsc-dataseed.binance.org"
retry_count = 3
max_concurrent = 10

[database]
type = "sqlite"
db_name = "busd_indexer.db"

[http]
port = 8080
host = "0.0.0.0"

[[contracts]]
name = "busd"
address = "0x55d398326f99059ff775485246999027b3197955"
abi_path = "./abis/busd.abi"
from_block = 25000000
events = ["Transfer", "Approval"]
# BSC 公共 RPC 对 eth_getLogs 有查询限制，建议从较小批次开始
# 如遇 -32005 limit exceeded 会自动减半 batch_size
block_batch_size = 500
poll_interval_ms = 3000
max_reorg_depth = 50

# 事件过滤：格式为 "event:field:op:value"
# op 支持 gt/gte/lt/lte/eq
# value 支持十进制或 0x 十六进制
filters = [
    "Transfer:value:gt:500000000000000000000",
    "Approval:value:gt:1000000000000000000000",
]
