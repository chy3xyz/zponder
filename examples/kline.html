<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>zponder — PancakeSwap K线图</title>
<script src="https://unpkg.com/lightweight-charts@5.0.1/dist/lightweight-charts.standalone.production.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  #chart { width: 100%; height: 560px; }
  .loading-dot { animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.5 } }
</style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

<!-- Header -->
<header class="border-b border-gray-800 px-6 py-4">
  <div class="max-w-7xl mx-auto flex items-center justify-between">
    <div>
      <h1 class="text-xl font-bold">zponder
        <span class="text-gray-400 font-normal text-base">× PancakeSwap K线图</span>
      </h1>
      <p class="text-sm text-gray-500">数据源: zponder HTTP API → Swap 事件 → OHLC 聚合</p>
    </div>
    <div class="flex items-center gap-3">
      <span id="statusDot" class="w-2.5 h-2.5 rounded-full bg-gray-600"></span>
      <span id="statusText" class="text-sm text-gray-500">等待连接 zponder...</span>
    </div>
  </div>
</header>

<!-- Controls -->
<div class="max-w-7xl mx-auto px-6 py-4">
  <div class="flex flex-wrap gap-3 items-end">

    <!-- zponder API -->
    <div>
      <label class="block text-xs text-gray-500 mb-1">zponder API</label>
      <input id="apiBase" class="bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm w-64"
             value="http://localhost:8080">
    </div>

    <!-- Pair preset -->
    <div>
      <label class="block text-xs text-gray-500 mb-1">交易对</label>
      <select id="pair" class="bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm">
        <option value="busd_wbnb">BUSD/WBNB (PancakeSwap BSC)</option>
        <option value="cake_wbnb">CAKE/WBNB (PancakeSwap BSC)</option>
        <option value="custom">自定义...</option>
      </select>
    </div>

    <div id="customPair" class="hidden flex gap-3">
      <div><label class="block text-xs text-gray-500 mb-1">合约名</label>
        <input id="contractName" class="bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm w-36"></div>
    </div>

    <!-- Interval -->
    <div>
      <label class="block text-xs text-gray-500 mb-1">K线周期</label>
      <select id="interval" class="bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm">
        <option value="60">1分钟</option>
        <option value="300" selected>5分钟</option>
        <option value="900">15分钟</option>
        <option value="3600">1小时</option>
        <option value="14400">4小时</option>
      </select>
    </div>

    <!-- Blocks -->
    <div>
      <label class="block text-xs text-gray-500 mb-1">回溯区块</label>
      <select id="lookback" class="bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm">
        <option value="5000">5千</option>
        <option value="20000" selected>2万</option>
        <option value="100000">10万</option>
        <option value="500000">50万</option>
      </select>
    </div>

    <button id="fetchBtn" class="bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white rounded px-5 py-2 text-sm font-medium transition">
      加载数据
    </button>
  </div>
  <div id="syncInfo" class="text-xs text-gray-500 mt-2"></div>
</div>

<!-- Chart -->
<div class="max-w-7xl mx-auto px-6">
  <div id="chart" class="bg-gray-900 rounded-lg border border-gray-800"></div>
</div>

<!-- Stats -->
<div id="stats" class="max-w-7xl mx-auto px-6 py-2 flex flex-wrap gap-x-6 gap-y-1 text-xs text-gray-500"></div>

<script>
// ============================================================================
// zponder API 字段名映射
//
// zponder 用 sanitizeColumnName 转换 ABI 字段:
//   amount0In  → evt_amount0in
//   amount1Out → evt_amount1out
//   sender     → evt_sender (indexed → topic)
//
// API 返回格式 (/events/:contract/:event):
//   [{"evt_sender":"0x...","evt_amount0in":"0x...",...,"block_number":12345}, ...]
// ============================================================================

const SWAP_FIELDS = {
  amount0In:  'evt_amount0in',
  amount1In:  'evt_amount1in',
  amount0Out: 'evt_amount0out',
  amount1Out: 'evt_amount1out',
};

let chart = null, candleSeries = null, volumeSeries = null;

// ============================================================================
// 图表初始化
// ============================================================================
function initChart() {
  const el = document.getElementById('chart');
  el.innerHTML = '';
  if (chart) { chart.remove(); chart = null; }

  chart = LightweightCharts.createChart(el, {
    width: el.clientWidth, height: 560,
    layout: { background: { color: '#111827' }, textColor: '#9ca3af' },
    grid: { vertLines: { color: '#1f2937' }, horzLines: { color: '#1f2937' } },
    crosshair: { mode: 1 },
    timeScale: { timeVisible: true, borderColor: '#374151', secondsVisible: false },
    rightPriceScale: { borderColor: '#374151' }
  });

  candleSeries = chart.addCandlestickSeries({
    upColor: '#22c55e', downColor: '#ef4444',
    borderUpColor: '#22c55e', borderDownColor: '#ef4444',
    wickUpColor: '#22c55e', wickDownColor: '#ef4444',
  });

  volumeSeries = chart.addHistogramSeries({
    color: 'rgba(59,130,246,0.3)',
    priceFormat: { type: 'volume' },
    priceScaleId: '',
  });
  chart.priceScale('').applyOptions({ scaleMargins: { top: 0.8, bottom: 0 } });
}

// ============================================================================
// 从 zponder 拉取数据
// ============================================================================
async function fetchFromZponder() {
  const apiBase = document.getElementById('apiBase').value.replace(/\/$/, '');
  const pair = document.getElementById('pair').value;
  const contractName = pair === 'custom'
    ? document.getElementById('contractName').value
    : pair;
  const lookback = parseInt(document.getElementById('lookback').value);

  document.getElementById('fetchBtn').disabled = true;
  setStatus('loading', `查询 zponder: ${apiBase} ...`);

  // 1. 获取同步状态 → 知道最新区块
  let latestBlock = 0;
  try {
    const r = await fetch(`${apiBase}/sync_state`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const states = await r.json();
    for (const s of states) {
      if (s.name === contractName && s.current_block > latestBlock) {
        latestBlock = s.current_block;
      }
    }
  } catch (e) {
    setStatus('error', `无法连接 zponder: ${e.message}`);
    document.getElementById('fetchBtn').disabled = false;
    return;
  }

  const fromBlock = Math.max(0, latestBlock - lookback);
  document.getElementById('syncInfo').textContent =
    `zponder 已同步到区块 ${latestBlock.toLocaleString()}，查询范围 ${fromBlock.toLocaleString()} ~ ${latestBlock.toLocaleString()}`;

  // 2. 分页拉取 Swap 事件
  const allSwaps = [];
  const pageSize = 1000;
  let offset = 0;

  while (true) {
    const url = `${apiBase}/events/${contractName}/Swap?block_from=${fromBlock}&limit=${pageSize}&offset=${offset}&order=asc`;
    try {
      const r = await fetch(url);
      if (!r.ok) break;
      const rows = await r.json();
      if (!Array.isArray(rows) || rows.length === 0) break;
      allSwaps.push(...rows);
      const isLastPage = rows.length < pageSize;
      offset += pageSize;
      setStatus('loading', `已获取 ${allSwaps.length.toLocaleString()} 条 Swap 记录...`);
      if (isLastPage) break;
    } catch(e) {
      console.warn('分页请求失败:', e);
      break;
    }
  }

  if (allSwaps.length === 0) {
    setStatus('warning', '查询范围内无 Swap 事件 (尝试增大回溯区块)');
    document.getElementById('fetchBtn').disabled = false;
    return;
  }

  return allSwaps;
}

// ============================================================================
// OHLC 聚合
// ============================================================================
function aggregateToOHLC(swaps, intervalSec) {
  // BSC 出块时间 ~3s，用 block_number 估算时间戳
  // BSC 创世块时间 2020-08-29 约 1598659200
  const BSC_GENESIS = 1598659200; // unix timestamp
  const BSC_BLOCK_TIME = 3;       // seconds

  const candles = new Map();

  for (const row of swaps) {
    const block = typeof row.block_number === 'number' ? row.block_number : parseInt(row.block_number) || 0;
    // 估算区块时间戳
    const estTs = BSC_GENESIS + block * BSC_BLOCK_TIME;
    const bucket = Math.floor(estTs / intervalSec) * intervalSec;

    // 读取 zponder 返回的字段 (sanitizeColumnName: lowercase, evt_ prefix)
    const a0i = parseUint256(row[SWAP_FIELDS.amount0In]  || row['evt_amount0in']  || '0x0');
    const a1i = parseUint256(row[SWAP_FIELDS.amount1In]  || row['evt_amount1in']  || '0x0');
    const a0o = parseUint256(row[SWAP_FIELDS.amount0Out] || row['evt_amount0out'] || '0x0');
    const a1o = parseUint256(row[SWAP_FIELDS.amount1Out] || row['evt_amount1out'] || '0x0');

    // price = amount1 / amount0 (quote per base, BUSD per WBNB)
    const amt0 = a0i + a0o;
    const amt1 = a1i + a1o;
    if (amt0 === 0) continue;
    const price = amt1 / amt0;

    let c = candles.get(bucket);
    if (!c) {
      c = { time: bucket, open: price, high: price, low: price, close: price, vol: 0 };
      candles.set(bucket, c);
    }
    if (price > c.high) c.high = price;
    if (price < c.low) c.low = price;
    c.close = price;
    c.vol += amt1;
  }

  const result = [];
  for (const [_, c] of candles) result.push(c);
  result.sort((a, b) => a.time - b.time);
  return result;
}

// ============================================================================
// 主流程
// ============================================================================
async function loadAndRender() {
  const swaps = await fetchFromZponder();
  if (!swaps) return;

  const intervalSec = parseInt(document.getElementById('interval').value);
  const candles = aggregateToOHLC(swaps, intervalSec);

  if (candles.length === 0) {
    setStatus('warning', '无法聚合出 K线 (Swap 事件太少)');
    document.getElementById('fetchBtn').disabled = false;
    return;
  }

  // 渲染
  initChart();
  candleSeries.setData(candles);
  volumeSeries.setData(candles.map(c => ({
    time: c.time, value: c.vol,
    color: c.close >= c.open ? 'rgba(34,197,94,0.3)' : 'rgba(239,68,68,0.3)'
  })));
  chart.timeScale().fitContent();

  // 统计
  const first = candles[0], last = candles[candles.length - 1];
  const change = last.close - first.open;
  const pct = (change / first.open * 100);
  document.getElementById('stats').innerHTML = [
    `K线: <b>${candles.length}</b>`,
    `Swap事件: <b>${swaps.length.toLocaleString()}</b>`,
    `周期: <b>${formatInterval(intervalSec)}</b>`,
    `开: <b>${fmt(first.open)}</b>`,
    `高: <b>${fmt(Math.max(...candles.map(c=>c.high)))}</b>`,
    `低: <b>${fmt(Math.min(...candles.map(c=>c.low)))}</b>`,
    `收: <b>${fmt(last.close)}</b>`,
    `<span style="color:${change>=0?'#22c55e':'#ef4444'}">涨跌: <b>${pct>=0?'+':''}${pct.toFixed(2)}%</b></span>`,
  ].join(' &nbsp;|&nbsp; ');

  setStatus('ok', `${candles.length} 根K线, ${swaps.length.toLocaleString()} 条链上Swap`);
  document.getElementById('fetchBtn').disabled = false;
}

// ============================================================================
// 工具函数
// ============================================================================
function parseUint256(hex) {
  if (typeof hex === 'number') return hex;
  const s = String(hex).trim();
  if (s.startsWith('0x') || s.startsWith('0X')) {
    const clean = s.slice(2).replace(/^0+/, '') || '0';
    try {
      // BigInt division to get token amount (18 decimals for BUSD/WBNB/CAKE)
      return Number(BigInt('0x' + clean)) / 1e18;
    } catch { return 0; }
  }
  return parseFloat(s) || 0;
}

function fmt(n) {
  if (n >= 10000) return n.toFixed(2);
  if (n >= 1) return n.toFixed(4);
  if (n >= 0.001) return n.toFixed(6);
  return n.toExponential(4);
}

function formatInterval(sec) {
  if (sec < 300) return `${sec}s`;
  if (sec < 3600) return `${sec/60}m`;
  if (sec < 86400) return `${sec/3600}h`;
  return `${sec/86400}d`;
}

function setStatus(state, msg) {
  const dot = document.getElementById('statusDot');
  dot.className = 'w-2.5 h-2.5 rounded-full ' + (
    state === 'loading' ? 'bg-yellow-500 loading-dot' :
    state === 'ok' ? 'bg-green-500' :
    state === 'warning' ? 'bg-yellow-500' : 'bg-red-500'
  );
  document.getElementById('statusText').textContent = msg;
}

// ============================================================================
// 事件
// ============================================================================
document.getElementById('pair').addEventListener('change', function() {
  document.getElementById('customPair').classList.toggle('hidden', this.value !== 'custom');
});
document.getElementById('fetchBtn').addEventListener('click', loadAndRender);
window.addEventListener('resize', () => {
  if (chart) chart.applyOptions({ width: document.getElementById('chart').clientWidth });
});

// 首次加载
initChart();
setTimeout(loadAndRender, 500);
</script>
</body>
</html>
