# 全局配置
[global]
log_level = "info"
log_file = "./logs/indexer.log"
snapshot_interval = 3600        # 快照周期（秒），0 表示不开启
etherscan_api_key = ""          # 区块浏览器 API Key（自动获取 ABI）
chain = "ethereum"              # ethereum | bsc | polygon

# RPC 配置
[rpc]
url = "https://eth-mainnet.g.alchemy.com/v2/your-api-key"
timeout = 10000             # 超时时间（毫秒）
retry_count = 3             # 重试次数

# 数据库配置（sqlite / rocksdb / postgresql）
[database]
type = "sqlite"             # sqlite | rocksdb | postgresql
db_name = "eth_indexer.db"  # SQLite: .db 文件; RocksDB: 目录; PostgreSQL: 连接串
# PostgreSQL 连接串示例: "host=localhost port=5432 dbname=zponder user=postgres"
max_connections = 10        # 最大连接数 (仅 SQLite)

# HTTP 服务配置
[http]
port = 8080
host = "0.0.0.0"
cors = true                 # 是否允许跨域

# 合约配置（可配置多个合约，数组形式）
# 每个合约会自动根据其 ABI 中的事件定义创建对应的数据表
# 表名格式：event_{name}_{EventName}
# ============================================================
# 合约配置 — 以太坊示例
# ============================================================
[[contracts]]
name = "dai"
address = "0x6b175474e89094c44da98b954eedeac495271d0f"
abi_path = "./abis/erc20.abi"
from_block = 20000000
events = ["Transfer", "Approval"]

# ============================================================
