name: publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: build-${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            platform: darwin-arm64
          - runner: macos-13
            platform: darwin-x64
          - runner: ubuntu-latest
            platform: linux-x64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.16.0

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install sqlite3

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libsqlite3-dev

      - name: Build
        run: zig build -Doptimize=ReleaseFast

      - name: Prepare binary
        run: |
          mkdir -p artifacts
          cp zig-out/bin/zponder artifacts/zponder
          chmod +x artifacts/zponder

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform }}
          path: artifacts/zponder

  publish:
    name: publish npm
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download darwin-arm64
        uses: actions/download-artifact@v4
        with: { name: binary-darwin-arm64, path: npm/zponder/bin/darwin-arm64 }
        continue-on-error: true

      - name: Download darwin-x64
        uses: actions/download-artifact@v4
        with: { name: binary-darwin-x64, path: npm/zponder/bin/darwin-x64 }
        continue-on-error: true

      - name: Download linux-x64
        uses: actions/download-artifact@v4
        with: { name: binary-linux-x64, path: npm/zponder/bin/linux-x64 }
        continue-on-error: true

      - name: Set permissions
        run: chmod +x npm/zponder/bin/*/zponder 2>/dev/null || true

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          cd npm/zponder
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          echo "Version: $VERSION"

      - name: Publish
        uses: JS-DevTools/npm-publish@v3
        with:
          token: ${{ secrets.NPM_TOKEN }}
          package: npm/zponder
          access: public
